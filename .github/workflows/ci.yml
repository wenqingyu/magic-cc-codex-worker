name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify dist/ is in sync with src/
        run: |
          if ! git diff --exit-code dist/; then
            echo ""
            echo "::error::dist/ is out of date. Run 'npm run build' locally and commit the result."
            exit 1
          fi

      - name: Smoke — MCP tools/list
        run: ./scripts/smoke-tools-list.sh
