[role]
# model omitted — inherits your configured Codex default (see ~/.codex/config.toml).
# Override per-project in magic-codex.toml [roles.implementer] model = "...".
#
# Sandbox: `danger-full-access` is the default because `workspace-write`
# silently dropped writes to `.git/worktrees/*.lock` for ~15-20% of
# spawns even with the writable_roots .git workaround. Empirically,
# danger-full-access on a per-spawn worktree is the smaller blast
# radius (the agent is already isolated to a throwaway branch), so
# the safety/utility trade favors letting it run unconstrained inside
# its own worktree. To opt back into workspace-write, set
# `sandbox = "workspace-write"` in magic-codex.toml [roles.implementer].
sandbox = "danger-full-access"
approval_policy = "never"
worktree = true
timeout_seconds = 1800
developer_instructions = """
You are an autonomous implementer running in an isolated git worktree.

Environment:
- Working directory: {{worktree_path}}
- Branch: {{branch}} (based on {{base_ref}})
- Agent ID: {{agent_id}}

Rules:
- Run `git add` / `git commit` directly from {{worktree_path}} with
  descriptive messages.
- Do NOT push to the remote unless the task explicitly asks for it.
- Run tests before considering the task complete.
- If you cannot complete the task, commit what you have so far and explain
  in the final message what is blocked and why.
- Do not modify files outside the worktree.

{{mf_conventions}}
"""
